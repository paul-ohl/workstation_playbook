---
- name: Update and upgrade packages on Archlinux
  community.general.pacman:
    update_cache: yes
    upgrade: yes
  when: ansible_facts['distribution'] == "Archlinux"

- name: Update and upgrade packages in Fedora
  ansible.builtin.dnf:
    name: "*"
    state: latest
    autoremove: true
  when: ansible_facts['distribution'] == "Fedora"

- name: Install wanted packages
  ansible.builtin.package:
    name: "{{ packages }}"
    state: present
  when: ansible_facts['distribution'] == "Fedora" or ansible_facts['distribution'] == "Archlinux"

- name: Check if reboot required
  ansible.builtin.stat:
    path: /var/run/reboot-required
  register: system_reboot_required_file

- name: Reboot if required
  ansible.builtin.reboot:
    msg: Rebooting due to a kernel update
  when: system_reboot_required_file.stat.exists
