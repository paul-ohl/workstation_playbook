- name: Add user to sudo group
  ansible.builtin.user:
    name: "{{ username }}"
    groups: "{{ 'sudo' if ansible_facts['os_family'] == 'Debian' else 'wheel' }}"
    append: true
  become: true
  when: system_make_user_sudo

- name: Configure passwordless sudo
  ansible.builtin.lineinfile:
    path: "/etc/sudoers.d/{{ username }}"
    line: "{{ username }} ALL=(ALL) NOPASSWD: ALL"
    create: true
    validate: "visudo -cf %s"
    mode: "0440"
  become: true
  when: system_passwordless_sudo

- name: Ensure SDDM config drop-in directory exists
  ansible.builtin.file:
    path: /etc/sddm.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: system_auto_login_on_boot

- name: Configure SDDM autologin
  ansible.builtin.copy:
    dest: /etc/sddm.conf.d/autologin.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      [Autologin]
      User={{ username }}
      Session=hyprland
  when: system_auto_login_on_boot
