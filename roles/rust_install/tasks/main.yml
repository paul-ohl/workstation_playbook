- name: Check if cargo is installed
  ansible.builtin.stat:
    path: "/home/{{ username }}/.cargo/bin/cargo"
  register: rust_install_cargo_exists

- name: Install rust
  ansible.builtin.include_tasks: base-install.yml
  when: not rust_install_cargo_exists.stat.exists

- name: Install sccache
  ansible.builtin.include_tasks: install-sccache.yml
  when: rust_install_use_sccache

- name: Install mold
  ansible.builtin.include_tasks: install-mold.yml
  when: rust_install_use_mold

- name: Install cargo packages
  community.general.cargo:
    name: "{{ rust_install_packages }}"
    state: latest
  environment:
    PATH: "/home/{{ username }}/.cargo/bin:/usr/local/bin:/usr/local/sbin:/usr/bin:/usr/sbin"
    OPENSSL_NO_VENDOR: "true"
    CRATE_CC_NO_DEFAULTS: "true"
    CARGO_TARGET_DIR: "/tmp/cargo-installmdsRe4"
    CFLAGS: "-fPIE"
    RUSTC_WRAPPER: "/home/{{ username }}/.cargo/bin/sccache"
  ignore_errors: true
  register: rust_install_cargo_install_result
  when: not rust_install_packages.empty

- name: Installation failed, run the cargo command yourself
  ansible.builtin.debug:
    msg:
      - "`cargo install` seems to have failed, run the command yourself."
      - "cargo install {{ cargo_packages | join(' ') }}"
  when:
    - rust_install_cargo_install_result is failed
