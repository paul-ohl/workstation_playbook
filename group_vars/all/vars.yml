# System stuff

username: astro
shell: /usr/bin/zsh

# The URL at which to get the dotfiles
dotfiles_url: "git@github.com:paul-ohl/dotfiles.git"

# Which directories to stow in the dotfiles repo
# This will also determine whether some software is installed or not
stowed_directories:
  - alacritty
  - custom_scripts
  - git
  # - hyprland
  - kanata
  # - kitty
  - neovim
  - rust
  - tmux
  - zsh

# Install QEMU
qemu_install: false

packages:
  - alacritty
  - bat
  - beeper-v4-bin
  - btop
  - curl
  - discord
  - dolphin
  - du-dust
  - duf
  - dunst
  - exa
  - fastfetch
  - feishin
  - firefox
  - fzf
  - git
  - httpie
  - hyprlock
  - kitty
  - lazygit
  - lutris
  - neovim
  - nodejs
  - npm
  - obsidian
  - opencode
  - openssl
  - picard
  - protonup-qt
  - ripgrep
  - ripgrep
  - steam
  - stow
  - tmux
  - unzip
  - vim
  - vlc
  - vlc-plugins-all
  - waybar
  - wget
  - wofi
  - zsh

cargo_packages:
  - bacon
  - cargo-nextest
  - cargo-update
  - sqlx-cli

flatpak_packages:
  # - org.audacityteam.Audacity
  # - org.blender.Blender
  - com.spotify.Client
  - com.discordapp.Discord
  # - org.filezillaproject.Filezilla
  # - org.gimp.GIMP
  # - org.kde.kdenlive
  - md.obsidian.Obsidian
  # - com.getpostman.Postman
  - org.qbittorrent.qBittorrent
  # - com.slack.Slack
  # - com.valvesoftware.Steam
  # - com.github.IsmaelMartinez.teams_for_linux
  # - com.github.micahflee.torbrowser-launcher
  - org.videolan.VLC
  # - us.zoom.Zoom

# A list of domains to block using the `/etc/hosts` file
blocked_domains:
  - 9gag.com
  - www.9gag.com

# Geerlingguy's docker role variables
docker_edition: "ce"
docker_users:
  - "{{ username }}"
